openapi: 3.0.3
info:
    title: Bookstore API
    description: An api that returns data about books in a bookstore
    version: 1.0.0
servers:
    - url: http://0.0.0.0:8080
paths:
    /books:
        get:
            tags:
                - books
            summary: getBooks books
            operationId: books#getBooks
            parameters:
                - name: title
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: br1
                    minLength: 1
                  example: u
                - name: author
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: 6q3
                    minLength: 1
                  example: f
                - name: publishedAt
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: "1994-05-27"
                    format: date
                  example: "1991-03-17"
                - name: published_after
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: "1990-06-15"
                    format: date
                  example: "1972-04-13"
                - name: published_before
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: "1981-08-20"
                    format: date
                  example: "2013-07-28"
                - name: limit
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: integer
                    example: 16970450528176820998
                    format: int64
                  example: 14123794238947936810
                - name: offset
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: integer
                    example: 12763315690458616135
                    format: int64
                  example: 7246897860964436645
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Book'
                                example:
                                    - author: Optio dolorem.
                                      cover_url: Dolorem quia.
                                      id: 3374331773824625157
                                      publishedAt: "1997-09-18"
                                      title: Nemo voluptates eum ut deserunt temporibus at.
                                    - author: Optio dolorem.
                                      cover_url: Dolorem quia.
                                      id: 3374331773824625157
                                      publishedAt: "1997-09-18"
                                      title: Nemo voluptates eum ut deserunt temporibus at.
                                    - author: Optio dolorem.
                                      cover_url: Dolorem quia.
                                      id: 3374331773824625157
                                      publishedAt: "1997-09-18"
                                      title: Nemo voluptates eum ut deserunt temporibus at.
                            example:
                                - author: Optio dolorem.
                                  cover_url: Dolorem quia.
                                  id: 3374331773824625157
                                  publishedAt: "1997-09-18"
                                  title: Nemo voluptates eum ut deserunt temporibus at.
                                - author: Optio dolorem.
                                  cover_url: Dolorem quia.
                                  id: 3374331773824625157
                                  publishedAt: "1997-09-18"
                                  title: Nemo voluptates eum ut deserunt temporibus at.
                                - author: Optio dolorem.
                                  cover_url: Dolorem quia.
                                  id: 3374331773824625157
                                  publishedAt: "1997-09-18"
                                  title: Nemo voluptates eum ut deserunt temporibus at.
                                - author: Optio dolorem.
                                  cover_url: Dolorem quia.
                                  id: 3374331773824625157
                                  publishedAt: "1997-09-18"
                                  title: Nemo voluptates eum ut deserunt temporibus at.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
        post:
            tags:
                - books
            summary: createBook books
            operationId: books#createBook
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateBookRequestBody'
                        example:
                            author: Eum esse.
                            publishedAt: "2011-11-11"
                            title: Quia rerum odit amet.
            responses:
                "201":
                    description: Created response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Est eum et reprehenderit deleniti ut voluptas.
                                cover_url: Neque possimus doloremque.
                                id: 7196923411108578318
                                publishedAt: "1985-07-01"
                                title: Neque eum quaerat ipsam et.
                "400":
                    description: 'invalid_input: Bad Request response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "409":
                    description: 'conflict: Conflict response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
    /books/{id}:
        delete:
            tags:
                - books
            summary: deleteBook books
            operationId: books#deleteBook
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 3617260392997274261
                    format: int64
                  example: 2427775687547430175
            responses:
                "204":
                    description: No Content response.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
        get:
            tags:
                - books
            summary: getBook books
            operationId: books#getBook
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 7804121816172218315
                    format: int64
                  example: 4383961357418369433
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Qui nesciunt.
                                cover_url: Et cumque.
                                id: 7227316530711330698
                                publishedAt: "2002-01-20"
                                title: Illo at.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
        patch:
            tags:
                - books
            summary: updateBook books
            operationId: books#updateBook
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 3515120445461600829
                    format: int64
                  example: 7192883973767832015
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateBookRequestBody'
                        example:
                            author: Eaque beatae natus amet dolor a et.
                            publishedAt: "1998-09-28"
                            title: Ut non ab repellat sed architecto laborum.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Non odit nisi corrupti dignissimos.
                                cover_url: Et et in exercitationem facilis.
                                id: 2280955852903502164
                                publishedAt: "1973-10-19"
                                title: Et at neque quaerat ad inventore velit.
                "400":
                    description: 'invalid_input: Bad Request response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "409":
                    description: 'conflict: Conflict response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
    /books/{id}/cover:
        put:
            tags:
                - books
            summary: setBookCover books
            operationId: books#setBookCover
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 8305992917067369474
                    format: int64
                  example: 1376659783086137200
                - name: Content-Type
                  in: header
                  description: Content-Type header
                  allowEmptyValue: true
                  required: true
                  schema:
                    type: string
                    description: Content-Type header
                    example: Fuga officia.
                  example: Repellat officia fugiat sequi dolores qui.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Consequatur vitae natus eos aut odit voluptate.
                                cover_url: Tempore hic.
                                id: 8857044126479732653
                                publishedAt: "1971-09-23"
                                title: Voluptatem debitis possimus repellat non autem.
                "400":
                    description: 'invalid_image_format: Bad Request response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "413":
                    description: 'payload_too_large: Request Entity Too Large response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/vnd.goa.error:
                            schema:
                                $ref: '#/components/schemas/Error'
    /openapi.json:
        get:
            tags:
                - books
            summary: Download ./gen/http/openapi3.json
            operationId: books#/openapi.json
            responses:
                "200":
                    description: File downloaded
    /swagger:
        get:
            tags:
                - books
            summary: Download ./public/swagger.html
            operationId: books#/swagger
            responses:
                "200":
                    description: File downloaded
    /uploads/covers/{path}:
        get:
            tags:
                - books
            summary: Download ./uploads/covers
            operationId: books#/uploads/covers/{path}
            parameters:
                - name: path
                  in: path
                  description: Relative file path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: File downloaded
                "404":
                    description: File not found
components:
    schemas:
        Book:
            type: object
            properties:
                author:
                    type: string
                    example: Non omnis sit quis amet.
                cover_url:
                    type: string
                    example: Voluptates provident.
                id:
                    type: integer
                    example: 3772770409427556094
                    format: int64
                publishedAt:
                    type: string
                    example: "2001-07-07"
                    format: date
                title:
                    type: string
                    example: Ipsa debitis vel sit qui illo.
            description: A single book
            example:
                author: Quasi animi soluta.
                cover_url: Itaque temporibus libero voluptas repellat.
                id: 959847585787445188
                publishedAt: "2012-07-17"
                title: Provident nobis.
            required:
                - id
                - title
                - author
                - publishedAt
        CreateBookRequestBody:
            type: object
            properties:
                author:
                    type: string
                    description: Author of the book
                    example: Similique voluptatibus amet cupiditate eos consequatur vitae.
                publishedAt:
                    type: string
                    description: Publication time of the book
                    example: "1992-11-18"
                    format: date
                title:
                    type: string
                    description: Title of the book
                    example: Pariatur nesciunt.
            example:
                author: Similique dolorem dolorem.
                publishedAt: "1997-02-24"
                title: Odit veritatis quisquam quas corrupti neque sed.
            required:
                - title
                - author
                - publishedAt
        Error:
            type: object
            properties:
                fault:
                    type: boolean
                    description: Is the error a server-side fault?
                    example: false
                id:
                    type: string
                    description: ID is a unique identifier for this particular occurrence of the problem.
                    example: 123abc
                message:
                    type: string
                    description: Message is a human-readable explanation specific to this occurrence of the problem.
                    example: parameter 'p' must be an integer
                name:
                    type: string
                    description: Name is the name of this class of errors.
                    example: bad_request
                temporary:
                    type: boolean
                    description: Is the error temporary?
                    example: false
                timeout:
                    type: boolean
                    description: Is the error a timeout?
                    example: false
            example:
                fault: true
                id: 123abc
                message: parameter 'p' must be an integer
                name: bad_request
                temporary: false
                timeout: true
            required:
                - name
                - id
                - message
                - temporary
                - timeout
                - fault
        UpdateBookRequestBody:
            type: object
            properties:
                author:
                    type: string
                    description: Author of the book
                    example: Debitis omnis et unde omnis voluptas sequi.
                publishedAt:
                    type: string
                    description: Publication time of the book
                    example: "1999-01-24"
                    format: date
                title:
                    type: string
                    description: Title of the book
                    example: Qui sit.
            example:
                author: Nihil eveniet voluptas nihil fugit nihil.
                publishedAt: "1991-07-17"
                title: Quo quod.
tags:
    - name: books
      description: Service that returns data about books
