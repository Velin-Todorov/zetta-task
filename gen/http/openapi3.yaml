openapi: 3.0.3
info:
    title: Bookstore API
    description: An api that returns data about books in a bookstore
    version: 1.0.0
servers:
    - url: http://localhost:80
      description: Default server for bookstore
paths:
    /books:
        get:
            tags:
                - books
            summary: getBooks books
            operationId: books#getBooks
            parameters:
                - name: title
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: g07
                    minLength: 1
                  example: bs
                - name: author
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: vct
                    minLength: 1
                  example: "68"
                - name: published_at
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: "2001-02-21"
                    format: date
                  example: "1973-11-17"
                - name: published_after
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: "2007-08-24"
                    format: date
                  example: "1985-01-20"
                - name: published_before
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: string
                    example: "1982-03-25"
                    format: date
                  example: "1993-11-20"
                - name: limit
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: integer
                    example: 6587518560331569569
                    format: int64
                  example: 1774878994672470131
                - name: offset
                  in: query
                  allowEmptyValue: true
                  schema:
                    type: integer
                    example: 4298814998151032143
                    format: int64
                  example: 4960246915237812937
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Book'
                                example:
                                    - author: Et sed voluptate nemo voluptates.
                                      cover_url: Ut deserunt temporibus at sint optio dolorem.
                                      id: 2174091076160705473
                                      published_at: "1994-03-16"
                                      title: Magni et.
                                    - author: Et sed voluptate nemo voluptates.
                                      cover_url: Ut deserunt temporibus at sint optio dolorem.
                                      id: 2174091076160705473
                                      published_at: "1994-03-16"
                                      title: Magni et.
                            example:
                                - author: Et sed voluptate nemo voluptates.
                                  cover_url: Ut deserunt temporibus at sint optio dolorem.
                                  id: 2174091076160705473
                                  published_at: "1994-03-16"
                                  title: Magni et.
                                - author: Et sed voluptate nemo voluptates.
                                  cover_url: Ut deserunt temporibus at sint optio dolorem.
                                  id: 2174091076160705473
                                  published_at: "1994-03-16"
                                  title: Magni et.
                                - author: Et sed voluptate nemo voluptates.
                                  cover_url: Ut deserunt temporibus at sint optio dolorem.
                                  id: 2174091076160705473
                                  published_at: "1994-03-16"
                                  title: Magni et.
                                - author: Et sed voluptate nemo voluptates.
                                  cover_url: Ut deserunt temporibus at sint optio dolorem.
                                  id: 2174091076160705473
                                  published_at: "1994-03-16"
                                  title: Magni et.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Ad unde eius id.
                            example: Repudiandae omnis earum.
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Dignissimos et ipsam qui aperiam nemo officia.
                            example: Neque laborum aut eaque.
        post:
            tags:
                - books
            summary: createBook books
            operationId: books#createBook
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateBookRequestBody'
                        example:
                            author: Eum velit quibusdam alias adipisci.
                            published_at: "2005-07-03"
                            title: Consequatur ipsum aut corrupti minus.
            responses:
                "201":
                    description: Created response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Beatae ipsum corporis est quis.
                                cover_url: Animi quia vel ipsam corporis culpa nam.
                                id: 3957051167527810706
                                published_at: "1985-06-27"
                                title: Autem tenetur saepe odit et adipisci.
                "400":
                    description: 'invalid_input: Bad Request response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Ipsam autem quisquam adipisci.
                            example: Sunt quae doloremque omnis ipsam.
                "409":
                    description: 'conflict: Conflict response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Quis ad delectus voluptatem.
                            example: Sit in id tempore voluptas quam impedit.
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Aliquid itaque sit provident et sit.
                            example: Corrupti officiis tenetur quisquam.
    /books/{id}:
        delete:
            tags:
                - books
            summary: deleteBook books
            operationId: books#deleteBook
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 6743272930922536024
                    format: int64
                  example: 4657989844793881989
            responses:
                "204":
                    description: No Content response.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Dolorem delectus.
                            example: Et ipsum quis odio ab sit.
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Veniam quo.
                            example: Quaerat perspiciatis.
        get:
            tags:
                - books
            summary: getBook books
            operationId: books#getBook
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 5299275243505286735
                    format: int64
                  example: 7495905313052210202
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Aspernatur soluta explicabo voluptatem sed non distinctio.
                                cover_url: Labore cum libero pariatur et impedit.
                                id: 5156845107707654653
                                published_at: "1980-04-27"
                                title: Et cumque.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Quas molestias cupiditate.
                            example: Necessitatibus minus assumenda est porro quam tempora.
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Sit ea.
                            example: Voluptatem ut labore cumque itaque eveniet dolores.
        patch:
            tags:
                - books
            summary: updateBook books
            operationId: books#updateBook
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 7109588277359205564
                    format: int64
                  example: 9113922304860142974
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateBookRequestBody'
                        example:
                            author: Aspernatur accusamus sint dignissimos quia consequatur ea.
                            published_at: "2010-04-24"
                            title: Ducimus doloribus.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Enim quo.
                                cover_url: Porro error ipsam sed.
                                id: 8473140895541882298
                                published_at: "1978-03-11"
                                title: Non ullam voluptatum non distinctio.
                "400":
                    description: 'invalid_input: Bad Request response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Amet qui quidem non.
                            example: Facilis deserunt non nostrum fugit.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Earum est veritatis sed.
                            example: Est in hic.
                "409":
                    description: 'conflict: Conflict response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Odit magnam accusantium.
                            example: Reiciendis libero et laborum voluptate corrupti.
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Sapiente unde sapiente.
                            example: Earum nemo id quam ab optio.
    /books/{id}/cover:
        put:
            tags:
                - books
            summary: setBookCover books
            operationId: books#setBookCover
            parameters:
                - name: id
                  in: path
                  description: ID of the book
                  required: true
                  schema:
                    type: integer
                    description: ID of the book
                    example: 1917429390372628374
                    format: int64
                  example: 7685941032897743638
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Book'
                            example:
                                author: Consequatur accusantium laboriosam earum.
                                cover_url: Alias omnis.
                                id: 2974244956442087561
                                published_at: "1975-07-15"
                                title: Aut sint est in impedit perferendis.
                "400":
                    description: 'invalid_image_format: Bad Request response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Porro excepturi sapiente eum.
                            example: Ut aliquam qui excepturi totam.
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Dicta eius quidem nihil rem culpa voluptate.
                            example: Reiciendis veniam expedita.
                "413":
                    description: 'payload_too_large: Request Entity Too Large response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Laudantium temporibus quod facere quidem et.
                            example: Aut sequi facere.
                "500":
                    description: 'internal_error: Internal Server Error response.'
                    content:
                        application/json:
                            schema:
                                type: string
                                example: Et maiores minus.
                            example: Quibusdam alias.
components:
    schemas:
        Book:
            type: object
            properties:
                author:
                    type: string
                    example: Earum sit voluptates sed alias voluptatum quos.
                cover_url:
                    type: string
                    example: Laboriosam eveniet quo dolores rerum.
                id:
                    type: integer
                    example: 4318571843826868396
                    format: int64
                published_at:
                    type: string
                    example: "1997-07-25"
                    format: date
                title:
                    type: string
                    example: Molestiae qui.
            description: A single book
            example:
                author: Quibusdam nisi non aliquam.
                cover_url: Et voluptatem non illum quis.
                id: 218778666934579090
                published_at: "2002-10-04"
                title: Cumque laudantium facilis.
            required:
                - id
                - title
                - author
                - published_at
        CreateBookRequestBody:
            type: object
            properties:
                author:
                    type: string
                    description: Author of the book
                    example: Voluptatem molestiae repellat numquam consequatur adipisci.
                published_at:
                    type: string
                    description: Publication time of the book
                    example: "2000-12-08"
                    format: date
                title:
                    type: string
                    description: Title of the book
                    example: Corrupti enim voluptate consequatur sint voluptatibus consequuntur.
            example:
                author: Aspernatur at autem qui.
                published_at: "2006-02-14"
                title: Blanditiis maiores dolorem laborum facilis in in.
            required:
                - title
                - author
                - published_at
        UpdateBookRequestBody:
            type: object
            properties:
                author:
                    type: string
                    description: Author of the book
                    example: Saepe excepturi sit ipsum et non.
                published_at:
                    type: string
                    description: Publication time of the book
                    example: "1992-05-25"
                    format: date
                title:
                    type: string
                    description: Title of the book
                    example: Est unde ex.
            example:
                author: Rerum porro.
                published_at: "2010-12-20"
                title: Mollitia magnam laboriosam nihil blanditiis quasi.
tags:
    - name: books
      description: Service that returns data about books
